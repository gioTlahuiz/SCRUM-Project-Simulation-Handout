<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos</title>
    <link rel="stylesheet" href="contacto.css">
</head>
<body>
    <main>
    <h1>Contacto</h1>
    <p>¿Quieres comunicarte con el equipo de <strong>Tinta Nómada</strong>? Aquí tienes nuestros datos ficticios:</p>
    <p>Email: contacto@tintanomada.com</p>
    <p>Teléfono: +52 55 9876 5432</p>
    <section class="social">
     <h2>Síguenos en redes</h2>
     <div class="icons">
     <a href="https://www.facebook.com/tintanomada" target="_blank">
       <img src="images/facebook.png" alt="Facebook" class="icon">
     </a>
     <a href="https://www.instagram.com/tintanomada" target="_blank">
       <img src="images/instagram.png" alt="Instagram" class="icon">
     </a>
     <a href="https://wa.me/525512345678" target="_blank">
       <img src="images/whatsapp.png" alt="WhatsApp" class="icon">
     </a>
     </div>
    </section>

    <!-- Formulario opcional -->
    <form>
      <label for="name">Nombre:</label>
      <input type="text" id="name" name="name" placeholder="Escribe tu nombre"><br><br>

      <label for="email">Correo:</label>
      <input type="email" id="email" name="email" placeholder="ejemplo@correo.com"><br><br>

      <label for="message">Mensaje:</label><br>
      <textarea id="message" name="message" placeholder="Escribe tu mensaje aquí"></textarea><br><br>

      <button type="submit">Enviar</button>
    </form>
  </main>
  



  <!-- Footer -->
  <footer>
    <p>Autores: Equipo Tinta Nómada</p>
    <p>Email: contacto@tintanomada.com</p>
    <p>Proyecto: Sitio del Blog</p>
  </footer>

  <script src="contacto.js"></script>
    
</body>

</html>
